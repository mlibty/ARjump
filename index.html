<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    a-scene {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; filterMinCF: 0.001; filterBeta: 50; warmupTolerance: 5; missTolerance: 8;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; antialias: true; colorManagement: true; physicallyCorrectLights: false;"
  >
    <a-assets>
      <video
        id="video"
        src="./video.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video
        src="#video"
        position="0 0 -0.01"
        width="1"
        height="1.3"
        material="shader: flat; transparent: false; side: front; depthTest: true; depthWrite: false;"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
document.addEventListener("DOMContentLoaded", () => {
  const video = document.getElementById("video");
  const target = document.querySelector("[mindar-image-target]");

  // Create one-time start overlay
  const overlay = document.createElement("div");
  overlay.style.cssText = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font:24px sans-serif;
    z-index:9999;
    cursor:pointer;
  `;
  overlay.innerHTML = "Tap to enable audio";
  document.body.appendChild(overlay);

  let audioEnabled = false;

  overlay.addEventListener("click", async () => {
    try {
      video.muted = false;

      // Unlock media playback
      await video.play();
      video.pause();
      video.currentTime = 0;

      audioEnabled = true;
      overlay.remove();
    } catch (err) {
      console.error(err);
    }
  }, { once: true });

  target.addEventListener("targetFound", async () => {
    if (!audioEnabled) return;

    try {
      video.currentTime = 0;
      await video.play();
    } catch (err) {
      console.error(err);
    }
  });

  target.addEventListener("targetLost", () => {
    video.pause();
  });
});
</script>
</body>
</html>
